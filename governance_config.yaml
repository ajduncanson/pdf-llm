environment: dev
pipeline_version: "1.0.0"
data_classification: internal
retention_policy_days: 365
jurisdiction: AU

logging:
  log_dir: ./logs

thresholds:
  hallucination_score_max: 0.3
  faithfulness_score_min: 0.6
  answer_relevance_score_min: 0.6
  toxicity_score_max: 0.05
  top_chunk_similarity_min: 0.5
  total_latency_ms_max: 10000

scoring:
  enabled: true                 # set true to enable deferred RAGAS scoring via score_logs.py
  evaluator_provider: anthropic  # which provider's LLM judges quality (openai | anthropic | gemini)
  evaluator_model: claude-haiku-4-5  # cheap and fast for evaluation
  metrics:
    - faithfulness               # are claims grounded in retrieved context?
    - answer_relevancy           # is the answer relevant to the prompt?
    # - context_precision        # requires ground-truth reference — disabled by default
    # - context_recall           # requires ground-truth reference — disabled by default

cost_per_million_tokens:
  # Input / output averaged — update as pricing changes
  claude-sonnet-4-20250514: 9.00
  claude-opus-4-6: 75.00
  claude-haiku-4-5: 0.80
  gpt-4o: 10.00
  gpt-4o-mini: 0.30
  gemini-1.5-pro: 7.00
  gemini-1.5-flash: 0.30
